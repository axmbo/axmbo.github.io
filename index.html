<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>axmbo | Open Source Developer</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 10px;
        }

        p {
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Atualizamos o botão para alinhar o ícone e o texto lado a lado */
        .btn {
            display: inline-flex; /* Transforma o botão num container flexível */
            align-items: center;  /* Centraliza o ícone e o texto na mesma linha */
            justify-content: center;
            gap: 8px; /* Dá um pequeno espaço de 8 pixels entre o ícone e o texto */
            padding: 10px 20px;
            margin: 5px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-github { background-color: #238636; }
        .btn-github:hover { background-color: #2ea043; }

        .btn-gitlab { background-color: #fc6d26; }
        .btn-gitlab:hover { background-color: #e24329; }

        .btn-outline {
            background-color: transparent;
            border: 1px solid #8b949e;
            color: #c9d1d9;
        }
        .btn-outline:hover { background-color: #30363d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>axmbo.dev</h1>
        <h2>Desenvolvedor & Open-Source</h2>
        <p>
            Olá! Este é o meu espaço focado em construir e contribuir com projetos open-source.
            Abaixo você encontra os meus repositórios nas principais plataformas.
        </p>

        <a href="https://github.com/axmbo" target="_blank" class="btn btn-github">
            <i class="fab fa-github"></i> GitHub
        </a>

        <a href="https://gitlab.com/acl1970" target="_blank" class="btn btn-gitlab">
            <i class="fab fa-gitlab"></i> GitLab
        </a>

        <br><br>

        <a href="mailto:contact@axmbo.dev" class="btn btn-outline">
            <i class="fas fa-envelope"></i> contact@axmbo.dev
        </a>
    </div>

</body>
</html>
