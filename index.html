<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>axmbo | Open Source Developer</title>
    
    <style>
        /* Define as cores e fontes do site inteiro */
        body {
            background-color: #0d1117; /* Cor de fundo escura, parecida com o GitHub */
            color: #c9d1d9; /* Cor do texto clara */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* Estilo da caixa de conteúdo central */
        .container {
            max-width: 600px;
            padding: 40px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Estilo do seu nome */
        h1 {
            color: #58a6ff; /* Azul característico de links para devs */
            margin-bottom: 10px;
        }

        /* Estilo do texto descritivo */
        p {
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Estilo dos botões */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            color: #ffffff;
            background-color: #238636; /* Verde GitHub */
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        /* Cor do botão ao passar o mouse */
        .btn:hover {
            background-color: #2ea043;
        }

        /* Botão secundário (E-mail) */
        .btn-outline {
            background-color: transparent;
            border: 1px solid #8b949e;
            color: #c9d1d9;
        }

        .btn-outline:hover {
            background-color: #30363d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>axmbo.dev</h1>
        <h2>Desenvolvedor & Open-Source</h2>
        <p>
            Olá! Este é o meu espaço focado em construir e contribuir com projetos open-source. 
            Sinta-se à vontade para explorar os meus repositórios ou entrar em contato.
        </p>
        
        <a href="https://github.com/axmbo" target="_blank" class="btn">Meu Perfil no GitHub</a>
        
        <a href="mailto:contact@axmbo.dev" class="btn btn-outline">contact@axmbo.dev</a>
    </div>

</body>
</html>
